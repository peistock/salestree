version: "3.8"

services:
  db:
    image: ankane/pgvector:latest
    container_name: familymind-db
    restart: always
    environment:
      POSTGRES_USER: family
      POSTGRES_PASSWORD: ${DB_PASSWORD:-familymind2026}
      POSTGRES_DB: familymind
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U family -d familymind"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: familymind-app
    restart: always
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python -c 'from mind.memory import init_db; init_db()' &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
