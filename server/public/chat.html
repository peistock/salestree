        function renderProjectPanel(data) {
            const account = data.account_name || "客户";
            const signals = (data.signals || []).map((s, i) => `
                <div class="project-signal ${signalClass(s.type)}" data-signal-idx="${i}">
                    <div class="signal-header">
                        <span class="signal-type">${escapeHtml(s.type)}</span>
                        <span class="signal-source">${escapeHtml(s.source)} · ${escapeHtml(s.time)}</span>
                    </div>
                    <div class="signal-content">${renderMarkdown(s.content)}</div>
                    <div class="signal-actions">
                        <button class="signal-action" data-action="explain">追问背景</button>
                        <button class="signal-action" data-action="draft">生成跟进话术</button>
                    </div>
                </div>
            `).join("");

            const actions = (data.action_items || []).map((item, i) => `
                <li>
                    <span class="action-check" data-idx="${i}"></span>
                    <span>${escapeHtml(item)}</span>
                </li>
            `).join("");

            const crossRefs = (data.cross_reference || []).map((ref, i) => {
                const statusClass = ref.status === "未响应" ? "risk" : (ref.status === "部分响应" ? "todo" : "");
                return `
                    <div class="cross-ref-item ${statusClass}">
                        <div class="signal-header">
                            <span class="signal-type">${escapeHtml(ref.status)}</span>
                        </div>
                        <div class="signal-content">
                            <strong>客户要求</strong>${renderMarkdown(ref.customer_requirement)}
                            <strong>内部响应</strong>${renderMarkdown(ref.internal_response)}
                        </div>
                    </div>
                `;
            }).join("");

            projectPanelContent.innerHTML = `
                <div class="project-panel">
                    <div class="project-header">
                        <div class="panel-header-row">
                            ${renderProjectAccountSelector()}
                            <span class="project-meta">来源：飞书群 · 最近更新 ${new Date().toLocaleString()}</span>
                            <button class="panel-refresh-btn" id="refreshProjectPanel">🔄 更新</button>
                        </div>
                    </div>
                    <div class="project-body">
                        <div class="project-grid">
                            <div class="project-card">
                                <h3>整体动态</h3>
                                <div class="project-summary markdown-body">${renderMarkdown(data.summary || "")}</div>
                                <div class="project-actions">
                                    <button class="project-action-btn" id="askAccountOverview">跟销销聊聊这个客户</button>
                                    <button class="project-action-btn" id="askAccountPriority">今天最该优先处理什么？</button>
                                </div>
                            </div>

                            <div class="project-card">
                                <h3>销售洞察</h3>
                                <div class="project-insights markdown-body">${renderMarkdown(data.insights || "")}</div>
                            </div>

                            <div class="project-card full-width">
                                <h3>待办事项</h3>
                                <ul class="action-list">${actions || "<li>暂无待办</li>"}</ul>
                            </div>

                            <div class="project-card">
                                <h3>客户群动态</h3>
                                <div class="project-insights markdown-body">${renderMarkdown(data.customer_group_summary || "")}</div>
                            </div>

                            <div class="project-card">
                                <h3>内部群动态</h3>
                                <div class="project-insights markdown-body">${renderMarkdown(data.internal_group_summary || "")}</div>
                            </div>

                            <div class="project-card">
                                <h3>客户要求 × 内部响应</h3>
                                ${crossRefs ? `<div class="cross-ref-grid">${crossRefs}</div>` : "<div style=\"color:#8e8e93;font-size:14px\">暂无交叉匹配数据</div>"}
                            </div>

                            <div class="project-card">
                                <h3>关键信号</h3>
                                ${signals || "<div style=\"color:#8e8e93;font-size:14px\">暂无信号</div>"}
                            </div>
                        </div>
                    </div>
                </div>
            `;

            projectPanelContent.querySelectorAll(".action-check").forEach(btn => {
                btn.addEventListener("click", () => btn.classList.toggle("done"));
            });

            const refreshBtn = document.getElementById("refreshProjectPanel");
            if (refreshBtn) {
                refreshBtn.addEventListener("click", () => refreshProjectPanel(refreshBtn));
            }

            const accountSelect = document.getElementById("projectAccountSelect");
            if (accountSelect) {
                accountSelect.addEventListener("change", (e) => {
                    projectPanelLoaded = false;
                    loadProjectPanel(e.target.value);
                });
            }

            const overviewBtn = document.getElementById("askAccountOverview");
            if (overviewBtn) {
                overviewBtn.addEventListener("click", () => askAboutAccount(account, data, "overview"));
            }
            const priorityBtn = document.getElementById("askAccountPriority");
            if (priorityBtn) {
                priorityBtn.addEventListener("click", () => askAboutAccount(account, data, "priority"));
            }

            projectPanelContent.querySelectorAll(".signal-action").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const target = e.target;
                    const card = target.closest(".project-signal");
                    const idx = parseInt(card?.dataset.signalIdx || "-1", 10);
                    const signal = data.signals?.[idx];
                    if (!signal) return;
                    const action = target.dataset.action;
                    askAboutSignal(account, signal, action);
                });
            });
        }

        function askAboutAccount(account, data, mode) {
            // 顶部总览按钮：只打开项目面板内的悬浮聊天，不自动填充长 prompt，让用户自己输入
            openProjectChat(account);
        }

        function askAboutSignal(account, signal, action) {
            let prompt = `我正在看【${account}】的项目看板，其中有一条信号：\n\n`;
            prompt += `类型：${signal.type}\n来源群：${signal.source} · ${signal.time}\n内容：${signal.content}\n\n`;
            prompt += "请调用 read_feishu_messages 工具读取这个客户的飞书群原始聊天记录，找到这条信号的原文上下文（包括前后相关消息），结合客户群和内部群的内容进行交叉验证。\n\n";
            if (action === "explain") {
                prompt += "基于原始上下文，告诉我这条信号背后的具体背景、涉及哪些人、我需要关注哪些风险或机会。";
            } else {
                prompt += "基于原始上下文，帮我拟一段发给客户或内部协同的跟进话术，要求自然、专业、不冗长。";
            }
            sendFromProjectPanel(prompt);
        }

        function openProjectChat(account) {
            floatingChatMessages.innerHTML = "";
            floatingChatEl.classList.add("open");
            floatingChatToggle.classList.remove("open");
            floatUnread = 0;
            updateFloatBadge();
            loadTaskHistory();
            if (wsFloat) {
                wsFloat.onclose = null;
                wsFloat.onmessage = null;
                wsFloat.close();
                wsFloat = null;
            }
            if (floatReconnectTimer) {
                clearTimeout(floatReconnectTimer);
                floatReconnectTimer = null;
            }
            connectFloatingChat({
                createThread: true,
                threadTitle: account,
                onOpen: () => {
                    floatingChatInput.value = "";
                    floatingChatInput.placeholder = `关于 ${account}，想问销销什么？`;
                    floatingChatInput.focus();
                }
            });
        }

        function sendFromProjectPanel(prompt) {
            const title = `${currentProjectAccount} - 追问`;
            floatingChatMessages.innerHTML = "";
            floatingChatEl.classList.add("open");
            floatingChatToggle.classList.remove("open");
            floatUnread = 0;
            updateFloatBadge();
            loadTaskHistory();
            if (wsFloat) {
                wsFloat.onclose = null;
                wsFloat.onmessage = null;
                wsFloat.close();
                wsFloat = null;
            }
            if (floatReconnectTimer) {
                clearTimeout(floatReconnectTimer);
                floatReconnectTimer = null;
            }
            connectFloatingChat({
                createThread: true,
                threadTitle: title,
                onOpen: () => {
                    floatingChatInput.value = prompt;
                    setTimeout(() => sendFloating(), 50);
                }
            });
        }

        // 切到项目看板时加载数据
        const originalSwitchPanel = switchPanel;
        switchPanel = function(name) {
            originalSwitchPanel(name);
            if (name === "project") {
                loadProjectAccounts().then(() => loadProjectPanel());
            }
            if (name === "policy") {
                loadPolicyPanel();
            }
        };

        // ========== 政策看板加载 ==========
        const policyPanelContent = document.getElementById("policyPanelContent");
        let policyPanelLoaded = false;
        let currentPolicySheet = "";
        let currentPolicyQ = "";

        async function loadPolicyPanel({ q = currentPolicyQ, sheet = currentPolicySheet } = {}) {
            currentPolicyQ = q;
            currentPolicySheet = sheet;
            try {
                const params = new URLSearchParams();
                if (q) params.set("q", q);
                if (sheet) params.set("sheet", sheet);
                const res = await fetch(`/api/sales_policies?${params.toString()}`);
                if (!res.ok) {
                    const err = await res.json().catch(() => ({ error: "加载失败" }));
                    policyPanelContent.innerHTML = `<div class="policy-empty-state">${err.error || "暂无销售政策数据"}</div>`;
                    return;
                }
                const data = await res.json();
                renderPolicyPanel(data, q);
                policyPanelLoaded = true;
            } catch (e) {
                console.error("政策看板加载失败:", e);
                policyPanelContent.innerHTML = "<div class=\"policy-empty-state\">销售政策加载失败，请稍后重试</div>";
            }
        }

        async function refreshPolicyPanel(btn) {
            if (btn) {
                btn.disabled = true;
                btn.textContent = "同步中…";
            }
            try {
                const res = await fetch("/api/refresh_sales_policies", { method: "POST" });
                const data = await res.json();
                if (data.success) {
                    await loadPolicyPanel();
                } else {
                    policyPanelContent.innerHTML = `<div class="policy-empty-state">同步失败：${escapeHtml(data.error || "未知错误")}</div>`;
                }
            } catch (e) {
                policyPanelContent.innerHTML = "<div class=\"policy-empty-state\">同步失败，请稍后重试</div>";
            } finally {
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = "🔄 同步政策";
                }
            }
        }

        function renderPolicyPanel(data, q = "") {
            const sheets = data.sheets || [];
            const allSheetNames = data.sheetNames || [];
            const updatedAt = formatTime ? formatTime(new Date(data.updatedAt).getTime() / 1000) : data.updatedAt || "";

            let html = `
                <div class="policy-header">
                    <div class="policy-header-row">
                        <span class="policy-title">销售政策看板</span>
                        <span class="policy-meta">来源：飞书群${data.totalSheets > 1 ? ` · 共 ${data.totalSheets} 个 sheet` : ""}${updatedAt ? ` · 更新于 ${updatedAt}` : ""}</span>
                        <button class="panel-refresh-btn" id="policyRefreshBtn">🔄 同步政策</button>
                    </div>
                </div>
            `;

            let bodyHtml = `<input type="text" id="policySearch" class="policy-search" placeholder="搜索关键词…" value="${escapeHtml(q)}">`;

            if (!sheets.length) {
                html += `<div class="policy-body">${bodyHtml}<div class="policy-empty-state">暂无匹配的销售政策</div></div>`;
                policyPanelContent.innerHTML = html;
                bindPolicyToolbar();
                return;
            }

            // sheet 标签：只有多个 sheet 时才展示
            if (allSheetNames.length > 1) {
                const tabsHtml = allSheetNames.map((name, idx) => {
                    const hasData = sheets.some((s) => s.name === name);
                    const active = idx === 0 ? " active" : "";
                    const countBadge = hasData ? "" : " (空)";
                    return `<button class="policy-sheet-tab${active}" data-sheet="${escapeHtml(name)}">${escapeHtml(name)}${countBadge}</button>`;
                }).join("");
                bodyHtml += `<div class="policy-sheet-tabs">${tabsHtml}</div>`;
            }

            sheets.forEach((sheet, idx) => {
                const active = idx === 0 ? " active" : "";
                const highlighted = new Set(sheet.highlighted_rows || []);

                const headerCount = sheet.header_row_count || 3;
                const headerRows = sheet.rows.slice(0, headerCount);
                const bodyRows = sheet.rows.slice(headerCount);

                // 把以“备注”开头的行从表格中取出，单独展示，避免撑大单元格
                const tableRows = [];
                const inlineNotes = [];
                bodyRows.forEach((row) => {
                    const first = (row[0] || "").trim();
                    if (first.startsWith("备注")) {
                        inlineNotes.push(first);
                    } else {
                        tableRows.push(row);
                    }
                });
                const allNotes = [sheet.notes || ""].concat(inlineNotes).filter(Boolean).join("\n\n");

                let tableHtml = `<div class="policy-table-wrap"><table class="policy-table">`;
                tableHtml += `<thead>`;
                headerRows.forEach((row) => {
                    tableHtml += `<tr>${row.map((cell) => `<th>${escapeCell(cell)}</th>`).join("")}</tr>`;
                });
                tableHtml += `</thead><tbody>`;
                tableRows.forEach((row, ridx) => {
                    const absIdx = ridx + headerCount;
                    const hlClass = highlighted.has(absIdx) ? " highlight" : "";
                    tableHtml += `<tr class="${hlClass}">${row.map((cell) => `<td class="${cell ? "" : "empty"}">${escapeCell(cell)}</td>`).join("")}</tr>`;
                });
                tableHtml += `</tbody></table></div>`;

                bodyHtml += `
                    <div class="policy-sheet-section${active}" data-sheet="${escapeHtml(sheet.name)}">
                        ${allSheetNames.length > 1 ? `<div class="policy-sheet-title">${escapeHtml(sheet.name)}</div>` : ""}
                        <div class="policy-sheet-subtitle">
                            生效日期：${escapeHtml(sheet.effective_date || "—")} · ${tableRows.length} 行数据
                        </div>
                        ${tableHtml}
                        ${allNotes ? `<div class="policy-notes"><h4>备注</h4>${escapeHtml(allNotes).replace(/\n/g, "<br>")}</div>` : ""}
                    </div>
                `;
            });

            html += `<div class="policy-body">${bodyHtml}</div>`;
            policyPanelContent.innerHTML = html;
            bindPolicyToolbar();
            bindSheetTabs();
        }

        function escapeCell(text) {
            if (!text) return "";
            return escapeHtml(text).replace(/\n/g, "<br>");
        }

        function bindPolicyToolbar() {
            const searchInput = document.getElementById("policySearch");
            const refreshBtn = document.getElementById("policyRefreshBtn");

            if (searchInput) {
                searchInput.addEventListener("input", debouncePolicySearch);
            }
            if (refreshBtn) {
                refreshBtn.addEventListener("click", () => refreshPolicyPanel(refreshBtn));
            }
        }

        function bindSheetTabs() {
            const tabs = document.querySelectorAll(".policy-sheet-tab");
            const sections = document.querySelectorAll(".policy-sheet-section");
            tabs.forEach((tab) => {
                tab.addEventListener("click", () => {
                    const sheetName = tab.dataset.sheet;
                    tabs.forEach((t) => t.classList.remove("active"));
                    tab.classList.add("active");
                    sections.forEach((s) => {
                        s.classList.toggle("active", s.dataset.sheet === sheetName);
                    });
                });
            });
        }

        let policySearchTimer = null;
        function debouncePolicySearch(e) {
            if (policySearchTimer) clearTimeout(policySearchTimer);
            policySearchTimer = setTimeout(() => {
                loadPolicyPanel({ q: e.target.value });
            }, 250);
        }

        // ========== 悬浮聊天窗口 ==========
        let wsFloat = null;
        let floatCurrentStatus = null;
        let floatStreamingMsg = null;
        let floatReconnectTimer = null;
        let floatHistorySent = false;
        let floatUnread = 0;

        function appendMini(text, cls = "agent") {
            const div = document.createElement("div");
            div.className = "mini-msg " + cls;
            div.innerHTML = text;
            floatingChatMessages.appendChild(div);
            floatingChatMessages.scrollTop = floatingChatMessages.scrollHeight;
            return div;
        }

        function updateFloatBadge() {
            if (floatUnread > 0 && !floatingChatEl.classList.contains("open")) {
                floatingChatBadge.textContent = floatUnread > 99 ? "99+" : floatUnread;
                floatingChatBadge.style.display = "flex";
            } else {
                floatingChatBadge.style.display = "none";
                floatUnread = 0;
            }
        }

        function finishFloatTurn() {
            floatingChatSend.disabled = false;
            floatingChatInput.disabled = false;
            floatingChatInput.focus();
        }

        function connectFloatingChat(options = {}) {
            const { createThread = false, threadTitle = "", onOpen } = options;
            const wsProtocol = location.protocol === "https:" ? "wss:" : "ws:";
            wsFloat = new WebSocket(`${wsProtocol}//${location.host}/ws/chat`);

            wsFloat.onopen = () => {
                floatCurrentStatus = null;
                floatStreamingMsg = null;
                appendMini("已连接，可以继续聊天", "status");
                const userId = userSelect.value || "web_user";
                if (createThread) {
                    wsFloat.send(JSON.stringify({ user_id: userId, action: "new_thread", title: threadTitle }));
                } else {
                    wsFloat.send(JSON.stringify({ user_id: userId, action: "hello" }));
                }
                if (typeof onOpen === "function") onOpen();
            };

            wsFloat.onclose = () => {
                if (floatCurrentStatus) { floatCurrentStatus.remove(); floatCurrentStatus = null; }
                floatStreamingMsg = null;
                appendMini("连接已断开，正在重连…", "status");
                if (!floatReconnectTimer) {
                    floatReconnectTimer = setTimeout(() => {
                        floatReconnectTimer = null;
                        connectFloatingChat();
                    }, 3000);
                }
            };

            wsFloat.onerror = (err) => {
                console.error("悬浮聊天 WebSocket 错误:", err);
            };

            function ensureFloatStreamingAgent() {
                if (floatCurrentStatus) {
                    floatCurrentStatus.remove();
                    floatCurrentStatus = null;
                }
                if (!floatStreamingMsg) {
                    floatStreamingMsg = document.createElement("div");
                    floatStreamingMsg.className = "mini-msg agent";
                    floatStreamingMsg.style.whiteSpace = "pre-wrap";
                    floatingChatMessages.appendChild(floatStreamingMsg);
                    floatingChatMessages.scrollTop = floatingChatMessages.scrollHeight;
                }
                return floatStreamingMsg;
            }

            wsFloat.onmessage = (ev) => {
                const data = JSON.parse(ev.data);
                if (data.type === "status" || data.type === "event") {
                    if (!floatCurrentStatus) floatCurrentStatus = appendMini(data.message || "处理中…", "status");
                    else floatCurrentStatus.textContent = data.message || "处理中…";
                } else if (data.type === "history") {
                    if (data.hint) appendMini(`<em style="color:#888">${escapeHtml(data.hint)}</em>`, "status");
                    (data.messages || []).forEach(m => {
                        const cls = m.role === "user" ? "user" : "agent";
                        appendMini(escapeHtml(m.content).replace(/\\n/g, "<br>"), cls);
                    });
                    floatingChatMessages.scrollTop = floatingChatMessages.scrollHeight;
                } else if (data.type === "token") {
                    ensureFloatStreamingAgent().textContent += data.content;
                    floatingChatMessages.scrollTop = floatingChatMessages.scrollHeight;
                } else if (data.type === "result") {
                    if (floatCurrentStatus) { floatCurrentStatus.remove(); floatCurrentStatus = null; }
                    let html = escapeHtml(data.reply).replace(/\\n/g, "<br>");
                    (data.files || []).forEach(f => {
                        const href = f.startsWith("/") ? f : "/" + f;
                        html += `<a class="file-link" href="${href}" target="_blank">📎 ${f.split("/").pop()}</a>`;
                    });
                    if (floatStreamingMsg) {
                        floatStreamingMsg.innerHTML = html;
                        floatStreamingMsg = null;
                    } else {
                        appendMini(html, "agent");
                    }
                    finishFloatTurn();
                    if (!floatingChatEl.classList.contains("open")) {
                        floatUnread += 1;
                        updateFloatBadge();
                    }
                } else if (data.type === "error") {
                    if (floatCurrentStatus) { floatCurrentStatus.remove(); floatCurrentStatus = null; }
                    if (floatStreamingMsg) { floatStreamingMsg.remove(); floatStreamingMsg = null; }
                    appendMini(data.message, "error");
                    finishFloatTurn();
                }
            };
        }

        function sendFloating() {
            const text = floatingChatInput.value.trim();
            if (!text) return;
            if (!wsFloat || wsFloat.readyState !== WebSocket.OPEN) {
                appendMini("尚未连接到服务器", "error");
                return;
            }
            appendMini(escapeHtml(text).replace(/\\n/g, "<br>"), "user");
            floatingChatInput.value = "";
            floatingChatInput.disabled = true;
            floatingChatSend.disabled = true;
            floatStreamingMsg = null;
            floatCurrentStatus = appendMini("销销正在思考…", "status");
            wsFloat.send(JSON.stringify({ user_id: userSelect.value, message: text }));
        }

        floatingChatSend.addEventListener("click", sendFloating);
        floatingChatInput.addEventListener("keydown", (e) => { if (e.key === "Enter") sendFloating(); });

        floatingChatToggle.addEventListener("click", () => {
            floatingChatEl.classList.add("open");
            floatingChatToggle.classList.remove("open");
            floatUnread = 0;
            updateFloatBadge();
            floatingChatInput.focus();
        });

        floatingChatClose.addEventListener("click", () => {
            floatingChatEl.classList.remove("open");
            const currentPanel = document.querySelector(".panel.active").id.replace("panel-", "");
            if (currentPanel !== "collab") {
                floatingChatToggle.classList.add("open");
            }
        });

        loadUsers().then(() => {
            pollTask();
            loadTaskHistory();
            // 用户列表加载完成后，如果 WebSocket 已连接，补发握手恢复历史
            if (ws && ws.readyState === WebSocket.OPEN) {
                const userId = userSelect.value || "web_user";
                ws.send(JSON.stringify({ user_id: userId, action: "hello" }));
            }
        });
        connect();
        setInterval(pollTask, 3000);
        connectFloatingChat();
    </script>
</body>
</html>
