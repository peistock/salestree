<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="referrer" content="no-referrer" />
<title>销销树资讯工作台</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Serif+SC:wght@500;700;900&display=swap" rel="stylesheet" />
<style>
:root{
  --paper:#f4efe4; --paper-2:#efe8d8; --card:#fbf8f0; --ink:#1c1813; --ink-2:#4a4239; --ink-3:#7a6f5e;
  --line:#d9cfb8; --line-2:#e7dfcc; --vermilion:#d8401f; --vermilion-d:#b8311a; --moss:#41684e; --gold:#a9762a;
  --font-display:"Fraunces","Noto Serif SC",Georgia,serif;
  --font-sans:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  --font-mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
  --r:5px; --r-lg:12px; --shadow:0 1px 0 var(--line),0 18px 40px -28px rgba(28,24,19,.5); --maxw:1180px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--font-sans);line-height:1.6;-webkit-font-smoothing:antialiased}
.grain{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.5;background-image:radial-gradient(rgba(28,24,19,.025) 1px,transparent 1px);background-size:3px 3px}
a{color:var(--vermilion);text-decoration:none}
a:hover{text-decoration:underline}
button{font-family:var(--font-sans);cursor:pointer}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 1.4rem;position:relative;z-index:2}

/* header */
header{height:58px;border-bottom:1px solid var(--line);background:linear-gradient(var(--paper),var(--paper-2));position:sticky;top:0;z-index:10}
.head{display:flex;align-items:center;gap:1rem;padding:0;flex-wrap:wrap;height:100%}
.brand{display:flex;align-items:center;gap:.6rem}
.seal{width:38px;height:38px;border-radius:9px;background:var(--vermilion);color:var(--paper);font-family:var(--font-display);font-size:1.5rem;display:grid;place-items:center;box-shadow:var(--shadow)}
.brand h1{font-family:var(--font-display);font-weight:500;font-size:1.25rem;margin:0;line-height:1}
.brand em{font-style:italic;color:var(--ink-3);font-weight:400}
.brand .gen{font-family:var(--font-mono);font-size:.66rem;color:var(--ink-3);margin-top:.15rem}
.tabs{display:flex;gap:.2rem;margin-left:auto;flex-wrap:wrap}
.tab{border:1px solid transparent;background:none;padding:.45rem .85rem;border-radius:var(--r);font-size:.9rem;color:var(--ink-2)}
.tab:hover{background:var(--card)}
.tab.on{background:var(--card);border-color:var(--line);color:var(--ink);font-weight:500}
.icon-btn{border:1px solid var(--line);background:var(--card);border-radius:var(--r);padding:.45rem .6rem;font-size:.95rem;color:var(--ink-2)}

/* sections */
main{padding:1.6rem 0 4rem}
.view{display:none}
.view.on{display:block}
.section-title{font-family:var(--font-display);font-weight:500;font-size:1.5rem;margin:.2rem 0 1rem;display:flex;align-items:baseline;gap:.6rem}
.section-title .sub{font-family:var(--font-mono);font-size:.74rem;color:var(--ink-3)}

/* tiles */
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:.9rem;margin-bottom:1.6rem}
.tile{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:1rem 1.1rem;box-shadow:var(--shadow)}
.tile .k{font-family:var(--font-mono);font-size:.72rem;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em}
.tile .v{font-family:var(--font-display);font-size:2rem;line-height:1.1;margin-top:.25rem}
.tile .v small{font-size:.9rem;color:var(--ink-3)}

.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:1.2rem 1.3rem;box-shadow:var(--shadow);margin-bottom:1.3rem}
.panel h3{font-family:var(--font-display);font-weight:500;font-size:1.12rem;margin:0 0 .8rem}
.bar-row{display:grid;grid-template-columns:130px 1fr 44px;align-items:center;gap:.6rem;margin:.3rem 0;font-size:.86rem}
.bar-row .name{color:var(--ink-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar{height:9px;background:var(--line-2);border-radius:6px;overflow:hidden}
.bar>i{display:block;height:100%;background:var(--vermilion);border-radius:6px}
.bar-row .num{font-family:var(--font-mono);font-size:.78rem;color:var(--ink-3);text-align:right}

/* tags */
.chip{display:inline-block;font-family:var(--font-mono);font-size:.72rem;padding:.12rem .5rem;border:1px solid var(--line);border-radius:99px;color:var(--ink-2);background:var(--paper);margin:.12rem .2rem .12rem 0;cursor:pointer}
.chip:hover{border-color:var(--vermilion);color:var(--vermilion)}
.chip.lg{font-size:.85rem;padding:.2rem .7rem}
.tagcloud .chip{margin:.2rem}

/* toolbar */
.toolbar{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;margin-bottom:1rem}
.toolbar input[type=text],.toolbar select{font-family:var(--font-sans);font-size:.88rem;padding:.45rem .6rem;border:1px solid var(--line);border-radius:var(--r);background:var(--card);color:var(--ink);transition:border-color .15s,box-shadow .15s}
.toolbar input[type=text]:focus{border-color:var(--ink);box-shadow:3px 3px 0 var(--ink)}
.toolbar input[type=text]{min-width:200px;flex:1}
.toolbar label{font-size:.82rem;color:var(--ink-2);display:flex;align-items:center;gap:.3rem}
.btn{border:1px solid var(--line);background:var(--card);color:var(--ink);padding:.45rem .8rem;border-radius:var(--r);font-size:.86rem;transition:transform .12s ease,background .15s,color .15s,border-color .15s}
.btn:hover{border-color:var(--vermilion);color:var(--vermilion);transform:translateY(-1px)}
.btn.primary{background:var(--vermilion);color:#fff;border-color:var(--vermilion)}
.btn.primary:hover{background:var(--vermilion-d);transform:translateY(-1px)}
.btn.sm{padding:.25rem .55rem;font-size:.78rem}

/* article cards */
.art{background:var(--card);border:1px solid var(--line);border-left:3px solid transparent;border-radius:var(--r-lg);padding:1rem 1.15rem;margin-bottom:.9rem;box-shadow:var(--shadow);transition:transform .2s cubic-bezier(.2,.8,.2,1),box-shadow .2s ease}
.art:hover{transform:translateY(-2px);box-shadow:0 2px 4px var(--line),0 20px 44px -24px rgba(28,24,19,.35)}
.art.starred{border-left-color:var(--gold);background:linear-gradient(135deg,var(--card) 0%,rgba(169,118,42,.04) 100%)}
.art .star-btn{transition:all .15s ease}
.art .star-btn.on{color:var(--gold);font-weight:700}
.art-meta{font-family:var(--font-mono);font-size:.72rem;color:var(--ink-3);display:flex;gap:.7rem;flex-wrap:wrap;align-items:center}
.badge{font-family:var(--font-mono);font-size:.64rem;padding:.05rem .4rem;border-radius:99px;border:1px solid currentColor}
.badge.ok{color:var(--moss)} .badge.no{color:var(--gold)}
.art h3{font-family:var(--font-display);font-weight:500;font-size:1.12rem;margin:.35rem 0 .3rem;line-height:1.3}
.art .digest{font-size:.9rem;color:var(--ink-2);margin:.2rem 0 .5rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.art-foot{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;margin-top:.5rem}
.art-foot .spacer{flex:1}
.analysis{border-top:1px dashed var(--line);margin-top:.8rem;padding-top:.8rem;display:none}
.analysis.on{display:block}
.analysis h4{font-family:var(--font-display);font-weight:600;font-size:.95rem;color:var(--vermilion-d);margin:.9rem 0 .3rem}
.analysis h4:first-child{margin-top:0}
.analysis ul{margin:.2rem 0;padding-left:1.2rem}
.analysis li{font-size:.9rem;margin:.15rem 0}
.analysis p{font-size:.9rem;margin:.2rem 0}
.raw{border-top:1px dashed var(--line);margin-top:.8rem;padding-top:.8rem;display:none}
.raw.on{display:block}
.raw-meta{font-family:var(--font-mono);font-size:.73rem;color:var(--ink-3);margin-bottom:.5rem;display:flex;gap:.7rem;flex-wrap:wrap}
.raw-text{font-size:.92rem;color:var(--ink);line-height:1.85;max-height:440px;overflow:auto;background:var(--paper);border:1px solid var(--line-2);border-radius:var(--r);padding:.8rem 1rem}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(116px,1fr));gap:.6rem;margin-top:.4rem}
.gimg{margin:0}
.gimg img{width:100%;height:104px;object-fit:cover;border-radius:var(--r);border:1px solid var(--line);background:var(--line-2)}
.gimg img.broken{display:none}
.gimg figcaption{font-family:var(--font-mono);font-size:.68rem;text-align:center;margin-top:.2rem}
.muted{color:var(--ink-3);font-size:.86rem}
.empty{text-align:center;color:var(--ink-3);padding:3rem 1rem;font-style:italic}

/* collections */
.coll-grid{display:grid;grid-template-columns:260px 1fr;gap:1.2rem}
.coll-list .coll-item{display:flex;justify-content:space-between;align-items:center;padding:.55rem .7rem;border:1px solid var(--line);border-radius:var(--r);background:var(--card);margin-bottom:.5rem;cursor:pointer}
.coll-list .coll-item.on{border-color:var(--vermilion);background:#fff}
.coll-list .coll-item .cnt{font-family:var(--font-mono);font-size:.72rem;color:var(--ink-3)}
.read-item{display:grid;grid-template-columns:26px 1fr auto;gap:.6rem;align-items:center;padding:.4rem 0;border-bottom:1px solid var(--line-2);font-size:.9rem}
.read-item .ord{font-family:var(--font-mono);color:var(--gold);font-size:.8rem}
.modal{position:fixed;inset:0;background:rgba(28,24,19,.45);display:none;place-items:center;z-index:50}
.modal.on{display:grid}
.modal .box{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:1.4rem;max-width:440px;width:92%;box-shadow:0 30px 60px -20px rgba(0,0,0,.5)}
.modal h3{font-family:var(--font-display);font-weight:500;margin:0 0 1rem}
.field{margin-bottom:.8rem}
.field label{display:block;font-size:.8rem;color:var(--ink-2);margin-bottom:.25rem}
.field input,.field select{width:100%;padding:.5rem .6rem;border:1px solid var(--line);border-radius:var(--r);font-family:var(--font-sans);background:var(--paper)}
.field .hint{font-size:.72rem;color:var(--ink-3);margin-top:.25rem}
.row-end{display:flex;justify-content:flex-end;gap:.5rem;margin-top:1rem}

/* toast */
#toast{position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--paper);padding:.6rem 1.1rem;border-radius:var(--r);font-size:.86rem;opacity:0;transition:.25s;z-index:100;pointer-events:none;box-shadow:0 18px 40px -16px rgba(28,24,19,.6)}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{background:var(--vermilion-d)}
.typing{display:inline-block;width:7px;height:1em;background:var(--vermilion);vertical-align:text-bottom;animation:blink 1s steps(2) infinite}
@keyframes blink{0%,50%{opacity:1}50.1%,100%{opacity:0}}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.sec-no{font-family:var(--font-mono);font-size:.72rem;letter-spacing:.16em;color:var(--vermilion);text-transform:uppercase}
.art{animation:rise .35s both}
.lead-card{border-left:3px solid var(--vermilion)}
.lead-sections{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.8rem;margin:.6rem 0}
.lead-sec{background:var(--paper);border:1px solid var(--line-2);border-radius:var(--r);padding:.6rem .7rem}
.lead-sec h5{font-family:var(--font-mono);font-size:.7rem;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);margin:0 0 .35rem}
.lead-chips{display:flex;flex-wrap:wrap;gap:.25rem}

@media(max-width:720px){.coll-grid{grid-template-columns:1fr}.bar-row{grid-template-columns:96px 1fr 40px}.lead-sections{grid-template-columns:1fr}}

/* ─── knowledge web (知识脉络) ─── */
.kb-legend{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;margin:.2rem 0 .9rem}
.kb-legend .lg{display:inline-flex;align-items:center;gap:.35rem;font-family:var(--font-mono);font-size:.74rem;color:var(--ink-2);padding:.2rem .55rem;border:1px solid var(--line);border-radius:99px;background:var(--paper);cursor:pointer;transition:border-color .15s,opacity .15s}
.kb-legend .lg .dot{width:9px;height:9px;border-radius:50%;flex:none}
.kb-legend .lg:hover{border-color:var(--ink-3)}
.kb-legend .lg.dim{opacity:.35}
.kb-legend .hint{font-family:var(--font-mono);font-size:.7rem;color:var(--ink-3);margin-left:auto}
.kb-grid{display:grid;grid-template-columns:1fr 320px;gap:1.2rem;align-items:start}
.kb-graph{position:relative;background:radial-gradient(120% 120% at 50% 0%,var(--card),var(--paper-2));border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow);overflow:hidden}
.kb-graph svg{display:block;width:100%;height:clamp(360px,52vh,560px);cursor:grab;touch-action:none}
.kb-graph svg.grab{cursor:grabbing}
.kb-graph .reset{position:absolute;top:.6rem;right:.6rem;z-index:3}
.kb-graph .gtip{position:absolute;pointer-events:none;z-index:4;background:var(--ink);color:var(--paper);font-size:.76rem;line-height:1.35;padding:.35rem .55rem;border-radius:var(--r);max-width:230px;opacity:0;transform:translateY(4px);transition:opacity .12s;box-shadow:0 14px 30px -14px rgba(28,24,19,.7)}
.kb-graph .gtip.on{opacity:1;transform:translateY(0)}
.kb-graph .gtip b{font-family:var(--font-display);font-weight:600}
.kb-graph .gtip i{font-style:normal;color:#c9bfa8;font-family:var(--font-mono);font-size:.68rem}
.edge{stroke:var(--line);stroke-width:1;fill:none}
.edge.ref{stroke:var(--vermilion);stroke-width:1.4;opacity:.55}
.edge.lit{stroke:var(--vermilion);stroke-width:2;opacity:.95}
.node{cursor:pointer}
.node circle{stroke:var(--card);stroke-width:1.5;transition:opacity .18s,stroke .15s}
.node text{font-family:var(--font-sans);font-size:9px;fill:var(--ink-2);pointer-events:none;opacity:0;transition:opacity .18s}
.node:hover circle{stroke:var(--ink)}
.node.sel circle{stroke:var(--ink);stroke-width:2.5}
.node.sel text,.node:hover text{opacity:1}
.kb-graph.has-sel .node:not(.sel):not(.adj){opacity:.28}
.kb-graph.has-sel .edge:not(.lit){opacity:.12}
.kb-entry{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow);padding:1.1rem 1.15rem;position:sticky;top:74px}
.kb-entry .acc{font-family:var(--font-mono);font-size:.72rem;color:var(--ink-3);display:flex;gap:.6rem;flex-wrap:wrap}
.kb-entry h3{font-family:var(--font-display);font-weight:500;font-size:1.16rem;line-height:1.3;margin:.35rem 0 .5rem}
.kb-entry .sum{font-size:.9rem;color:var(--ink-2);margin:.2rem 0 .7rem}
.kb-entry h5{font-family:var(--font-mono);font-size:.7rem;letter-spacing:.04em;text-transform:uppercase;color:var(--vermilion);margin:.9rem 0 .35rem;display:flex;align-items:center;gap:.4rem}
.kb-entry h5 .n{color:var(--ink-3)}
.kb-entry .links{list-style:none;margin:.1rem 0 0;padding:0}
.kb-entry .links li{font-size:.86rem;padding:.28rem .5rem;border:1px solid var(--line-2);border-radius:var(--r);margin-bottom:.32rem;cursor:pointer;background:var(--paper);transition:border-color .15s,transform .12s}
.kb-entry .links li:hover{border-color:var(--vermilion);transform:translateX(2px)}
.kb-entry .links li .src{display:block;font-family:var(--font-mono);font-size:.66rem;color:var(--ink-3);margin-top:.1rem}
.kb-entry .none{font-size:.82rem;color:var(--ink-3);font-style:italic;margin:.1rem 0}
.kb-entry .open{margin-top:1rem;width:100%}
.kb-index{margin-top:1.4rem}
.kb-index .section-title{font-size:1.18rem}
@media(max-width:860px){.kb-grid{grid-template-columns:1fr}.kb-entry{position:static}}
</style>
</head>
<body>
<div class="grain" aria-hidden="true"></div>

<header><div class="wrap head">
  <div class="brand">
    <div>
      <h1>销销树 <em>资讯工作台</em></h1>
      <div class="gen">离线 · 生成于 __GENERATED_AT__ <span id="save-mode"></span></div>
    </div>
  </div>
  <nav class="tabs" id="tabs">
    <button class="tab on" data-view="library">文章库</button>
    <button class="tab" data-view="leads">线索库</button>
    <button class="tab" data-view="kb">知识库</button>
    <button class="tab" data-view="collections">收藏夹</button>
    <button class="tab" data-view="overview">总览</button>
  </nav>
  <button class="icon-btn" id="open-settings" title="AI 接口设置">⚙︎</button>
</div></header>

<main class="wrap">
  <section class="view on" id="view-library"></section>
  <section class="view" id="view-leads"></section>
  <section class="view" id="view-kb"></section>
  <section class="view" id="view-collections"></section>
  <section class="view" id="view-overview"></section>
</main>

<!-- settings modal -->
<div class="modal" id="settings-modal"><div class="box">
  <h3>AI 接口设置（预留）</h3>
  <p class="muted" style="margin-top:-.4rem">不填也能用：页面默认只读 agent 预生成的拆解。填了才会启用「用 AI 即时拆解」，按现有 <code>/api/chat</code> 协议调用。Key 仅存本机浏览器，绝不写入文件或知识库。</p>
  <div class="field"><label>后端 URL（Deno/兼容后端）</label><input id="set-base" placeholder="https://你的后端.deno.dev" /></div>
  <div class="field"><label>Provider</label>
    <select id="set-provider"><option value="openai">OpenAI</option><option value="deepseek">DeepSeek</option><option value="dashscope">通义千问</option></select>
  </div>
  <div class="field"><label>Model</label><input id="set-model" placeholder="gpt-4o-mini / deepseek-chat / qwen-plus" /></div>
  <div class="field"><label>API Key（仅本机 localStorage）</label><input id="set-key" type="password" placeholder="sk-..." />
    <div class="hint">清空并保存即可移除本机 Key。</div></div>
  <div class="row-end"><button class="btn" id="set-cancel">取消</button><button class="btn primary" id="set-save">保存</button></div>
</div></div>

<div id="toast"></div>

<script id="kb-data" type="application/json">__KB_DATA__</script>
<script>
"use strict";
/* ─────────── data ─────────── */
const DATA = (()=>{ try{ return JSON.parse(document.getElementById("kb-data").textContent); }catch(e){ return {articles:{},topics:[],tags:{},collections:{},leads:{}}; } })();
const ARTS = Object.values(DATA.articles||{});
const ARTBYID = DATA.articles||{};
const TOPICS = DATA.topics||[];
const TAGS = DATA.tags||{};
const LEADS = (()=>{ const out=[]; for(const ls of Object.values(DATA.leads||{})) out.push(...(ls||[])); return out.sort((a,b)=>(b.publishDate||"").localeCompare(a.publishDate||"")); })();
const TOPIC_NAME = Object.fromEntries(TOPICS.map(t=>[t.id,t.name]));

/* ─────────── localStorage state ─────────── */
const LS = {
  get(k,d){ try{ const v=localStorage.getItem(k); return v==null?d:JSON.parse(v);}catch{ return d; } },
  set(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} }
};
const K_COLL="mozhai.collections", K_AI="mozhai.ai", K_AICACHE="mozhai.ai.analysis", K_CUR="mozhai.curColl";
// 由 kb.py serve（http://127.0.0.1）打开时 SERVER=true → 收藏夹自动存回 knowledge_base.json
const SERVER = /^https?:$/.test(location.protocol);
let collections = {};
let aiCfg = LS.get(K_AI,{base:"",provider:"openai",model:"",key:""});
let aiCache = LS.get(K_AICACHE,{});   // {id: markdown}
let curColl = LS.get(K_CUR,"");
function seedCollections(){
  let c = LS.get(K_COLL,null);
  if(c===null){ c={}; for(const [name,x] of Object.entries(DATA.collections||{})) c[name]={name,articleIds:(x.articleIds||[]).slice()}; }
  return c;
}
async function bootCollections(){
  if(SERVER){ try{ const r=await fetch("/api/kb-collections"); if(r.ok){ collections=(await r.json()).collections||{}; LS.set(K_COLL,collections); return; } }catch(e){} }
  collections = seedCollections(); LS.set(K_COLL,collections);
}
function updateSaveMode(){ const s=document.getElementById("save-mode"); if(!s)return;
  s.textContent = SERVER ? "· 收藏夹自动存盘 ✓" : "· 收藏夹存本浏览器（清缓存会丢，建议用 kb.py serve 打开）";
  s.style.color = SERVER ? "var(--moss)" : "var(--gold)"; }
let _saveT;
function saveColls(){
  LS.set(K_COLL,collections);
  if(SERVER){ clearTimeout(_saveT); _saveT=setTimeout(serverSave,600); }
}
async function serverSave(){
  try{ const r=await fetch("/api/save-collections",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({collections})});

/* ─────────── helpers ─────────── */
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const $=s=>document.querySelector(s);
let toastT;
function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add("on"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("on"),1900); }
function download(name,text){ const b=new Blob([text],{type:"application/json"}); const u=URL.createObjectURL(b); const a=document.createElement("a"); a.href=u; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(u),1000); }
function fmtMd(md){
  const lines=String(md||"").split("\n"); let out="",inList=false;
  const inline=s=>esc(s).replace(/\*\*(.+?)\*\*/g,"<b>$1</b>").replace(/`(.+?)`/g,"<code>$1</code>");
  for(let ln of lines){ ln=ln.replace(/\s+$/,"");
    if(/^#{1,4}\s+/.test(ln)){ if(inList){out+="</ul>";inList=false;} out+="<h4>"+inline(ln.replace(/^#{1,4}\s+/,""))+"</h4>"; }
    else if(/^[-*]\s+/.test(ln)){ if(!inList){out+="<ul>";inList=true;} out+="<li>"+inline(ln.replace(/^[-*]\s+/,""))+"</li>"; }
    else if(ln.trim()===""){ if(inList){out+="</ul>";inList=false;} }
    else { if(inList){out+="</ul>";inList=false;} out+="<p>"+inline(ln)+"</p>"; }
  }
  if(inList)out+="</ul>"; return out;
}
const hasAnalysis=a=>a.analysis&&(a.analysis.summary||(a.analysis.viewpoints||[]).length||(a.analysis.data||[]).length||(a.analysis.tags||[]).length||a.analysis.audience);

function filtered(){
  const q=filt.q.trim().toLowerCase();
  return ARTS.filter(a=>{
    if(filt.account&&a.account!==filt.account)return false;
    if(filt.topic&&!(a.topicIds||[]).includes(filt.topic))return false;
    if(filt.tag&&!((a.analysis&&a.analysis.tags)||[]).includes(filt.tag))return false;
    if(filt.analyzed&&!a.analyzedAt)return false;
    if(q&&!((a.title||"").toLowerCase().includes(q)||(a.content||"").toLowerCase().includes(q)||(a.digest||"").toLowerCase().includes(q)||(a.account||"").toLowerCase().includes(q)))return false;
    return true;
  }).sort((a,b)=>(b.publishDate||"").localeCompare(a.publishDate||""));
}
function analysisHtml(a){
  const an=a.analysis||{};
  if(hasAnalysis(a)){
    const list=arr=>(arr||[]).length?"<ul>"+arr.map(x=>"<li>"+esc(x)+"</li>").join("")+"</ul>":'<p class="muted">—</p>';
    return `
      <h4>一句话总结</h4><p>${esc(an.summary)||'<span class="muted">—</span>'}</p>
      <h4>核心观点</h4>${list(an.viewpoints)}
      <h4>关键数据 / 事实</h4>${list(an.data)}
      <h4>关键词标签</h4><div>${(an.tags||[]).map(t=>`<span class="chip">${esc(t)}</span>`).join("")||'<span class="muted">—</span>'}</div>
      <h4>价值与适用人群</h4><p>${esc(an.audience)||'<span class="muted">—</span>'}</p>
      ${(a.crossRefs||[]).length?`<h4>关联文章</h4><ul>${a.crossRefs.map(id=>`<li>${ARTBYID[id]?esc(ARTBYID[id].title):esc(id)}</li>`).join("")}</ul>`:""}`;
  }
  if(aiCache[a.id]) return `<p class="muted" style="margin-top:0">AI 即时拆解：</p>`+fmtMd(aiCache[a.id]);
  let h=`<p class="muted">尚未拆解。取批次让本地 agent 拆解：<code>python3 kb.py list --unanalyzed --content --json</code> → <code>kb.py apply</code> 写回。</p>`;
  if(aiConfigured()) h+=`<button class="btn sm" data-act="ai" data-id="${esc(a.id)}">⚡ 用 AI 即时拆解</button>`;
  return h;
}
function rawHtml(a){
  const imgs=a.images||[];
  const text=a.content?`<div class="raw-text">${esc(a.content).replace(/\n/g,"<br>")}</div>`:'<p class="muted">（正文未取到——可能是图文/视频类推送或被风控。可点上方链接看原文。）</p>';
  const gallery=imgs.length?`<div class="gallery">${imgs.map((u,i)=>`<figure class="gimg"><img loading="lazy" referrerpolicy="no-referrer" src="${esc(u)}" alt="配图${i+1}" onerror="this.classList.add('broken')"><figcaption><a href="${esc(u)}" target="_blank" rel="noopener">图${i+1} ↗</a></figcaption></figure>`).join("")}</div>`:"";
  return `<div class="raw-meta">${a.link?`<a href="${esc(a.link)}" target="_blank" rel="noopener">↗ 打开公众号原文</a>`:""}<span>${(a.content||"").length} 字</span><span>${imgs.length} 图</span>${a.cover?`<a href="${esc(a.cover)}" target="_blank" rel="noopener">封面 ↗</a>`:""}</div>${text}${imgs.length?`<h4 style="font-family:var(--font-display);color:var(--vermilion-d);margin:.9rem 0 .3rem">正文配图（${imgs.length}）</h4>${gallery}`:""}`;

$("#view-library").addEventListener("click",async e=>{
  const btn=e.target.closest("[data-act]"); if(!btn)return;
  const art=btn.closest(".art"); const id=art&&art.dataset.id; const a=ARTBYID[id];
  const act=btn.dataset.act;
  if(act==="expand"){ const p=art.querySelector(".analysis"); p.classList.toggle("on"); btn.textContent=p.classList.contains("on")?"收起":"查看拆解"; }
  else if(act==="raw"){ const p=art.querySelector(".raw"); if(!p.dataset.filled){ p.innerHTML=rawHtml(a); p.dataset.filled="1"; } p.classList.toggle("on"); btn.textContent=p.classList.contains("on")?"收起原文":("查看原文"+((a.images||[]).length?` · ${a.images.length}图`:"")); }
  else if(act==="star"){ addToCollection(id); }
  else if(act==="ai"){ runAiArticle(a,art.querySelector(".analysis")); }
});
function addToCollection(id){
  if(!curColl){ toast("请先在上方「当前收藏夹」选择或新建一个收藏夹"); return; }
  const c=collections[curColl]; if(!c)return;
  const i=c.articleIds.indexOf(id);
  if(i>=0){ c.articleIds.splice(i,1); toast("已从《"+curColl+"》移除"); }
  else { c.articleIds.push(id); toast("已加入《"+curColl+"》"); }
  saveColls();
  // update visual state for this card
  const card=document.querySelector(`.art[data-id="${id}"]`);
  if(card){
    const inColl=c.articleIds.includes(id);
    card.classList.toggle("starred",inColl);
    const starBtn=card.querySelector(".star-btn");
    if(starBtn){ starBtn.classList.toggle("on",inColl); starBtn.textContent=inColl?"★ 已收藏":"☆ 收藏"; }
  }
}

/* ─────────── knowledge web (知识脉络) ─────────── */
const KB_BASE_COLORS=["#d8401f","#41684e","#a9762a","#3f5b74","#8a4b6b","#6a7b3a","#b8311a","#536b4a","#9a5b2a"];
const _topicColor={};
function strHash(s){ let h=2166136261>>>0; s=String(s); for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return (h>>>0); }
function rand01(seed){ let x=(seed^0x9e3779b9)>>>0; x^=x<<13; x>>>=0; x^=x>>17; x^=x<<5; x>>>=0; return (x%100000)/100000; }
function topicColorOf(tid){
  if(tid==null||tid===""||tid==="__none")return "#9a8f7b";
  if(_topicColor[tid])return _topicColor[tid];
  const idx=TOPICS.findIndex(t=>t.id===tid);
  let c; if(idx>=0&&idx<KB_BASE_COLORS.length)c=KB_BASE_COLORS[idx];
  else c=`hsl(${strHash(tid)%360} 36% 42%)`;
  _topicColor[tid]=c; return c;
}
const primaryTopic=a=>(a.topicIds&&a.topicIds.length?a.topicIds[0]:"__none");
const topicLabel=k=>k==="__none"?"未归类":(TOPIC_NAME[k]||k);
function backlinksOf(id){ return ARTS.filter(a=>(a.crossRefs||[]).includes(id)); }

let KBG=null, kbSel=null, kbLegendKey=null, kbT={k:1,tx:0,ty:0};

function renderKB(){
  const view=$("#view-kb");
  if(!ARTS.length){
    view.innerHTML=`<h2 class="section-title"><span class="sec-no">No.03</span> 知识脉络 <span class="sub">graph · backlinks · index</span></h2>
      <div class="panel"><p class="muted">知识库尚空。先 <code>python3 wechat_collector.py collect &lt;公众号&gt;</code> 采集,再让本地 agent 用 <code>kb.py list --unanalyzed</code> → <code>kb.py apply</code> 拆解归类,脉络自会浮现。</p></div>`;
    return;
  }
  // ── 1. cluster layout ──
  const clusters={}; ARTS.forEach(a=>{ const k=primaryTopic(a); (clusters[k]=clusters[k]||[]).push(a); });
  const orderKeys=[...TOPICS.map(t=>t.id).filter(k=>clusters[k]), ...(clusters["__none"]?["__none"]:[])];
  const W=1100,H=560,cx=W/2,cy=H/2, nC=orderKeys.length;
  const Rx = nC<=1?0:W*0.33, Ry = nC<=1?0:H*0.30;
  const pos={};
  orderKeys.forEach((k,ci)=>{
    const ang = nC<=1?0:(ci/nC)*Math.PI*2 - Math.PI/2;
    const ccx=cx+Rx*Math.cos(ang), ccy=cy+Ry*Math.sin(ang);
    const m=clusters[k], spread=Math.min(150,46+m.length*7);
    m.forEach(a=>{ const aa=rand01(strHash(a.id))*Math.PI*2, rr=spread*Math.sqrt(rand01(strHash(a.id+"·")))*(m.length===1?0:1);
      pos[a.id]={x:ccx+rr*Math.cos(aa), y:ccy+rr*Math.sin(aa)}; });
  });
  // ── 2. edges ──
  const refEdges=[], seen=new Set();
  ARTS.forEach(a=>(a.crossRefs||[]).forEach(rid=>{ if(!ARTBYID[rid]||rid===a.id)return;
    const key=[a.id,rid].sort().join("|"); if(seen.has(key))return; seen.add(key); refEdges.push([a.id,rid]); }));
  const spineEdges=[];
  orderKeys.forEach(k=>{ const m=clusters[k].slice().sort((x,y)=>strHash(x.id)-strHash(y.id));
    for(let i=0;i<m.length-1;i++)spineEdges.push([m[i].id,m[i+1].id]); });
  const conn={}; refEdges.forEach(([a,b])=>{ conn[a]=(conn[a]||0)+1; conn[b]=(conn[b]||0)+1; });
  // ── 3. de-overlap relaxation ──
  const ids=Object.keys(pos);
  for(let it=0;it<70;it++){ for(let i=0;i<ids.length;i++)for(let j=i+1;j<ids.length;j++){
    const A=pos[ids[i]],B=pos[ids[j]]; let dx=B.x-A.x,dy=B.y-A.y,d=Math.hypot(dx,dy)||0.01, min=27;
    if(d<min){ const p=(min-d)/2,ux=dx/d,uy=dy/d; A.x-=ux*p;A.y-=uy*p;B.x+=ux*p;B.y+=uy*p; } } }
  ids.forEach(id=>{ const p=pos[id]; p.x=Math.max(28,Math.min(W-28,p.x)); p.y=Math.max(28,Math.min(H-28,p.y)); });
  KBG={pos,refEdges,conn};
  // ── 4. svg ──
  const edgePath=(e,cls)=>{ const A=pos[e[0]],B=pos[e[1]]; if(!A||!B)return"";
    const mx=(A.x+B.x)/2,my=(A.y+B.y)/2,dx=B.x-A.x,dy=B.y-A.y,len=Math.hypot(-dy,dx)||1,bow=Math.min(38,Math.hypot(dx,dy)*0.14);
    const qx=mx+(-dy/len)*bow, qy=my+(dx/len)*bow;
    return `<path class="edge ${cls}" data-a="${esc(e[0])}" data-b="${esc(e[1])}" d="M${A.x.toFixed(1)} ${A.y.toFixed(1)} Q${qx.toFixed(1)} ${qy.toFixed(1)} ${B.x.toFixed(1)} ${B.y.toFixed(1)}"/>`; };
  const edgesSvg=spineEdges.map(e=>edgePath(e,"")).join("")+refEdges.map(e=>edgePath(e,"ref")).join("");
  const nodesSvg=ARTS.map(a=>{ const p=pos[a.id], r=(6+Math.min(conn[a.id]||0,6)*1.2).toFixed(1), c=topicColorOf(primaryTopic(a));
    return `<g class="node" data-id="${esc(a.id)}" transform="translate(${p.x.toFixed(1)},${p.y.toFixed(1)})"><circle r="${r}" fill="${c}"/><text y="${(-r-4)}" text-anchor="middle">${esc((a.title||"").slice(0,11))}</text></g>`; }).join("");
  // ── 5. legend ──
  const legend=orderKeys.map(k=>`<span class="lg" data-topic="${esc(k)}"><span class="dot" style="background:${topicColorOf(k)}"></span>${esc(topicLabel(k))} <small>${clusters[k].length}</small></span>`).join("");
  // ── 6. index strip (保留旧分析) ──
  const byMonth={}; ARTS.forEach(a=>{ const m=(a.publishDate||"").slice(0,7); if(m)byMonth[m]=(byMonth[m]||0)+1; });
  const months=Object.keys(byMonth).sort(), maxM=Math.max(1,...Object.values(byMonth));
  const tagArr=Object.entries(TAGS), maxTag=Math.max(1,...tagArr.map(x=>x[1].length),1);
  view.innerHTML=`
    <h2 class="section-title"><span class="sec-no">No.03</span> 知识脉络 <span class="sub">graph · backlinks · index</span></h2>
    <div class="kb-legend" id="kb-legend">${legend}<span class="hint">点节点看词条 · 拖拽平移 · 滚轮缩放</span></div>
    <div class="kb-grid">
      <div class="kb-graph" id="kb-graph">
        <button class="btn sm reset" id="kb-reset">重置视图</button>
        <div class="gtip" id="kb-gtip"></div>
        <svg id="kb-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet"><g id="kb-vp">${edgesSvg}${nodesSvg}</g></svg>
      </div>
      <aside class="kb-entry" id="kb-entry"></aside>
    </div>
    <div class="kb-index">
      <h2 class="section-title"><span class="sec-no">No.03b</span> 脉络索引 <span class="sub">topics · tags · timeline</span></h2>
      <div class="panel"><h3>主题聚类</h3>${TOPICS.length?TOPICS.map(t=>`
        <div style="margin-bottom:.8rem">
          <div style="font-family:var(--font-display);font-size:1.02rem"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${topicColorOf(t.id)};margin-right:.4rem"></span>${esc(t.name)} <span class="muted">(${(t.articleIds||[]).length})</span></div>
          ${(t.keywords||[]).length?`<div style="margin-top:.2rem">${t.keywords.map(k=>`<span class="chip">${esc(k)}</span>`).join("")}</div>`:""}
        </div>`).join(""):'<p class="muted">尚无主题。让 agent 用 <code>kb.py topic-upsert</code> + <code>kb.py set-meta --topics</code> 归类。</p>'}</div>
      <div class="panel"><h3>标签云</h3><div class="tagcloud">${tagArr.length?tagArr.map(([t,ids])=>`<span class="chip" style="font-size:${(0.7+ids.length/maxTag*0.5).toFixed(2)}rem" data-tag="${esc(t)}">${esc(t)} <small>${ids.length}</small></span>`).join(""):'<span class="muted">尚无标签。</span>'}</div></div>
      <div class="panel"><h3>发布时间线</h3>${months.length?months.map(m=>`<div class="bar-row"><span class="name">${m}</span><span class="bar"><i style="width:${byMonth[m]/maxM*100}%"></i></span><span class="num">${byMonth[m]}</span></div>`).join(""):'<p class="muted">暂无日期数据</p>'}</div>
    </div>`;
  view.querySelectorAll("[data-tag]").forEach(c=>c.onclick=()=>gotoLibraryWithTag(c.dataset.tag));
  wireKBGraph();
  // default selection = most connected
  let def=ARTS[0]; ARTS.forEach(a=>{ if((conn[a.id]||0)>(conn[def.id]||0))def=a; });
  kbT={k:1,tx:0,ty:0}; applyKBTransform();
  selectKBNode(def.id,true);
}

function applyKBTransform(){ const vp=$("#kb-vp"); if(vp)vp.setAttribute("transform",`translate(${kbT.tx} ${kbT.ty}) scale(${kbT.k})`); }

function renderKBEntry(id){
  const a=ARTBYID[id], host=$("#kb-entry"); if(!a||!host)return;
  const an=a.analysis||{};
  const li=(arr,label)=>arr.length?`<ul class="links">${arr.map(x=>`<li data-go="${esc(x.id)}">${esc(x.title)}<span class="src">${esc(x.account||"")}${x.account&&x.date?" · ":""}${esc(x.date||"")}</span></li>`).join("")}</ul>`:`<p class="none">${label}</p>`;
  const refs=(a.crossRefs||[]).map(rid=>ARTBYID[rid]).filter(Boolean).map(x=>({id:x.id,title:x.title,account:x.account,date:x.publishDate}));
  const backs=backlinksOf(id).map(x=>({id:x.id,title:x.title,account:x.account,date:x.publishDate}));
  const topics=(a.topicIds||[]);
  host.innerHTML=`
    <div class="acc"><span>${esc(a.account)||"(未知公众号)"}</span><span>${esc(a.publishDate)||"----"}</span></div>
    <h3>${esc(a.title)}</h3>
    ${an.summary?`<p class="sum">${esc(an.summary)}</p>`:(a.digest?`<p class="sum">${esc(a.digest)}</p>`:"")}
    ${topics.length?`<h5>所属主题</h5><div>${topics.map(t=>`<span class="chip" style="border-color:${topicColorOf(t)};color:${topicColorOf(t)}">${esc(TOPIC_NAME[t]||t)}</span>`).join("")}</div>`:""}
    ${(an.tags||[]).length?`<h5>关键词</h5><div>${an.tags.map(t=>`<span class="chip" data-tag="${esc(t)}">${esc(t)}</span>`).join("")}</div>`:""}
    <h5>本文引用 <span class="n">${refs.length}</span></h5>${li(refs,"未引用其他文章。")}
    <h5>被谁引用 <span class="n">${backs.length}</span></h5>${li(backs,"暂无文章引用本文。")}
    <button class="btn sm open" data-open="${esc(id)}">在文章库中打开 ↗</button>`;
  host.querySelectorAll("[data-go]").forEach(el=>el.onclick=()=>{ if(KBG.pos[el.dataset.go])selectKBNode(el.dataset.go); else openInLibrary(el.dataset.go); });
  host.querySelectorAll("[data-tag]").forEach(el=>el.onclick=()=>gotoLibraryWithTag(el.dataset.tag));
  const ob=host.querySelector("[data-open]"); if(ob)ob.onclick=()=>openInLibrary(id);
}

function selectKBNode(id,soft){
  kbSel=id; kbLegendKey=null;
  const graph=$("#kb-graph"); if(!graph)return;
  const adj=new Set(); KBG.refEdges.forEach(([a,b])=>{ if(a===id)adj.add(b); else if(b===id)adj.add(a); });
  graph.classList.toggle("has-sel",!soft);
  graph.querySelectorAll(".node").forEach(n=>{ const nid=n.dataset.id; n.classList.toggle("sel",nid===id); n.classList.toggle("adj",adj.has(nid)); });
  graph.querySelectorAll(".edge").forEach(p=>p.classList.toggle("lit",p.dataset.a===id||p.dataset.b===id));
  $("#kb-legend")&&$("#kb-legend").querySelectorAll(".lg").forEach(l=>l.classList.remove("dim"));
  renderKBEntry(id);
}

function highlightCluster(key){
  const graph=$("#kb-graph"); if(!graph)return;
  if(kbLegendKey===key){ resetKBView(); return; }
  kbLegendKey=key; kbSel=null;
  graph.classList.add("has-sel");
  graph.querySelectorAll(".node").forEach(n=>{ const a=ARTBYID[n.dataset.id]; const match=primaryTopic(a)===key; n.classList.toggle("adj",match); n.classList.remove("sel"); });
  graph.querySelectorAll(".edge").forEach(p=>p.classList.remove("lit"));
  $("#kb-legend").querySelectorAll(".lg").forEach(l=>l.classList.toggle("dim",l.dataset.topic!==key));
}

function resetKBView(){
  kbSel=null; kbLegendKey=null; kbT={k:1,tx:0,ty:0}; applyKBTransform();
  const graph=$("#kb-graph"); if(!graph)return;
  graph.classList.remove("has-sel");
  graph.querySelectorAll(".node").forEach(n=>n.classList.remove("sel","adj"));
  graph.querySelectorAll(".edge").forEach(p=>p.classList.remove("lit"));
  $("#kb-legend").querySelectorAll(".lg").forEach(l=>l.classList.remove("dim"));
}

function openInLibrary(id){
  filt={q:"",account:"",topic:"",tag:"",analyzed:false};
  document.querySelector('.tab[data-view="library"]').click();
  setTimeout(()=>{ const card=[...document.querySelectorAll('#view-library .art')].find(c=>c.dataset.id===id);
    if(card){ card.scrollIntoView({behavior:"smooth",block:"center"}); card.style.boxShadow="0 0 0 2px var(--vermilion)";
      setTimeout(()=>{ card.style.transition="box-shadow .6s"; card.style.boxShadow=""; },1500); } },70);
}

function wireKBGraph(){
  const graph=$("#kb-graph"), svg=$("#kb-svg"), tip=$("#kb-gtip"); if(!svg)return;
  $("#kb-reset").onclick=resetKBView;
  $("#kb-legend").querySelectorAll(".lg").forEach(l=>l.onclick=()=>highlightCluster(l.dataset.topic));
  // node click + hover tooltip (delegated)
  svg.addEventListener("click",e=>{ const n=e.target.closest(".node"); if(n&&!svg._moved)selectKBNode(n.dataset.id); });
  svg.addEventListener("mouseover",e=>{ const n=e.target.closest(".node"); if(!n)return; const a=ARTBYID[n.dataset.id]; if(!a)return;
    tip.innerHTML=`<b>${esc(a.title)}</b><br><i>${esc(a.account||"")} · ${esc(a.publishDate||"")}</i>`; tip.classList.add("on"); });
  svg.addEventListener("mousemove",e=>{ if(!tip.classList.contains("on"))return; const r=graph.getBoundingClientRect();
    let x=e.clientX-r.left+12,y=e.clientY-r.top+12; x=Math.min(x,r.width-data_tip_w(tip)); tip.style.left=x+"px"; tip.style.top=y+"px"; });
  svg.addEventListener("mouseout",e=>{ if(e.target.closest(".node"))tip.classList.remove("on"); });
  // pan + zoom
  let drag=null; svg._moved=false;
  svg.addEventListener("mousedown",e=>{ drag={x:e.clientX,y:e.clientY,tx:kbT.tx,ty:kbT.ty}; svg._moved=false; svg.classList.add("grab"); });
  window.addEventListener("mousemove",e=>{ if(!drag)return; const dx=e.clientX-drag.x,dy=e.clientY-drag.y; if(Math.abs(dx)+Math.abs(dy)>3)svg._moved=true;
    const sc=1100/svg.getBoundingClientRect().width; kbT.tx=drag.tx+dx*sc; kbT.ty=drag.ty+dy*sc; applyKBTransform(); });
  window.addEventListener("mouseup",()=>{ if(drag){ drag=null; svg.classList.remove("grab"); setTimeout(()=>svg._moved=false,30); } });
  svg.addEventListener("wheel",e=>{ e.preventDefault(); const f=e.deltaY<0?1.12:1/1.12; const nk=Math.max(0.5,Math.min(3,kbT.k*f));
    kbT.tx=550-(550-kbT.tx)*(nk/kbT.k); kbT.ty=280-(280-kbT.ty)*(nk/kbT.k); kbT.k=nk; applyKBTransform(); },{passive:false});
}
function data_tip_w(tip){ return Math.min(tip.offsetWidth||120,230); }

function renderCollDetail(){

  dates.sort();
  const topTags=Object.entries(tagCnt).sort((a,b)=>b[1]-a[1]).slice(0,12);

    <div class="panel"><h3>${esc(selColl)} <span class="muted">· ${arts.length} 篇</span></h3>

    <div id="c-ai-out"></div>`;
  host.querySelectorAll("[data-rm]").forEach(b=>b.onclick=()=>{ const i=c.articleIds.indexOf(b.dataset.rm); if(i>=0)c.articleIds.splice(i,1); saveColls(); renderCollections(); });
  const aiBtn=$("#c-ai"); if(aiBtn)aiBtn.onclick=()=>runAiCollection(selColl,arts);
}
function renderBreakdown(bd){
  if(typeof bd==="string")return fmtMd(bd);
  // structured breakdown object → render known fields then fallback
  let h="";
  const sect=(t,v)=>{ if(!v)return; h+=`<h4 style="font-family:var(--font-display);color:var(--vermilion-d);margin:.8rem 0 .3rem">${esc(t)}</h4>`;
    if(Array.isArray(v))h+="<ul>"+v.map(x=>"<li>"+esc(x)+"</li>").join("")+"</ul>"; else h+="<p>"+esc(v)+"</p>"; };
  sect("共性主题",bd.themes||bd.commonThemes); sect("方法论 / 框架",bd.methods||bd.methodology);
  sect("关键数据汇总",bd.keyData||bd.data); sect("跨篇洞察",bd.insights); sect("阅读顺序建议",bd.readingOrder);
  if(!h&&bd.markdown)h=fmtMd(bd.markdown);
  return h||'<p class="muted">（breakdown 为空）</p>';
}

/* ─────────── AI (reserved /api/chat interface) ─────────── */
function aiConfigured(){ return !!((aiCfg.base||"").trim() && (aiCfg.key||"").trim()); }
function apiUrl(p){ return (aiCfg.base||"").replace(/\/+$/,"")+p; }
const SYS_PROMPT="你是一名资深的中文内容分析师，擅长从公众号文章中快速提炼结构化要点。输出必须为简洁、信息密度高的 Markdown。";
async function aiChat(userMsg,onDelta){
  const res=await fetch(apiUrl("/api/chat"),{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({provider:aiCfg.provider,model:aiCfg.model,key:aiCfg.key,messages:[{role:"system",content:SYS_PROMPT},{role:"user",content:userMsg}]})});
  if(!res.ok){ const e=await res.json().catch(()=>({})); throw new Error(e.error||("HTTP "+res.status)); }
  const reader=res.body.getReader(); const dec=new TextDecoder(); let buf="",result="";
  while(true){ const {done,value}=await reader.read(); if(done)break; buf+=dec.decode(value,{stream:true});
    const lines=buf.split("\n"); buf=lines.pop();
    for(const line of lines){ const t=line.trim(); if(!t.startsWith("data:"))continue; const d=t.slice(5).trim(); if(d==="[DONE]")continue;
      try{ const delta=JSON.parse(d).choices?.[0]?.delta?.content; if(delta){ result+=delta; onDelta&&onDelta(result); } }catch{} } }
  if(!result.trim())throw new Error("模型未返回内容");
  return result;
}
async function runAiArticle(a,panel){
  panel.classList.add("on"); panel.innerHTML='<p class="muted">AI 拆解中…</p><div id="ai-stream"></div>';
  const out=panel.querySelector("#ai-stream");
  const msg=`请对下面这篇公众号文章做结构化精析，用 Markdown 输出五个小标题（## 一句话总结 / ## 核心观点 / ## 关键数据 / 事实 / ## 关键词标签 / ## 价值与适用人群）。\n\n标题：${a.title}\n公众号：${a.account}\n正文：\n${(a.content||a.digest||"").slice(0,6000)}`;
  try{ const r=await aiChat(msg,t=>out.innerHTML=fmtMd(t)+'<span class="typing"></span>'); out.innerHTML=fmtMd(r); aiCache[a.id]=r; LS.set(K_AICACHE,aiCache); toast("AI 拆解完成（已缓存到本机）"); }
  catch(e){ out.innerHTML=`<p class="muted">AI 调用失败：${esc(e.message)}</p>`; }
}
async function runAiCollection(name,arts){
  const host=$("#c-ai-out"); host.innerHTML='<div class="panel"><h3>AI 收藏夹拆解</h3><div id="cai">分析中…</div></div>';
  const out=host.querySelector("#cai");
  const list=arts.map((a,i)=>`${i+1}. 《${a.title}》(${a.account}) — ${(a.digest||a.content||"").slice(0,160)}`).join("\n");
  const msg=`下面是收藏夹「${name}」里的 ${arts.length} 篇公众号文章。请做跨篇拆解，用 Markdown 输出：## 共性主题 / ## 方法论与框架 / ## 关键数据汇总 / ## 跨篇洞察 / ## 阅读顺序建议。\n\n${list}`;
  try{ const r=await aiChat(msg,t=>out.innerHTML=fmtMd(t)+'<span class="typing"></span>'); out.innerHTML=fmtMd(r); }
  catch(e){ out.innerHTML=`<p class="muted">AI 调用失败：${esc(e.message)}</p>`; }
}

/* ─────────── settings modal ─────────── */
const sm=$("#settings-modal");
$("#open-settings").onclick=()=>{ $("#set-base").value=aiCfg.base||""; $("#set-provider").value=aiCfg.provider||"openai"; $("#set-model").value=aiCfg.model||""; $("#set-key").value=aiCfg.key||""; sm.classList.add("on"); };
$("#set-cancel").onclick=()=>sm.classList.remove("on");
sm.onclick=e=>{ if(e.target===sm)sm.classList.remove("on"); };
$("#set-save").onclick=()=>{ aiCfg={base:$("#set-base").value.trim(),provider:$("#set-provider").value,model:$("#set-model").value.trim(),key:$("#set-key").value.trim()}; LS.set(K_AI,aiCfg); sm.classList.remove("on"); toast(aiConfigured()?"已保存，AI 接口已启用":"已保存（未填全，AI 接口未启用）"); };
